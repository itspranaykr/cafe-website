            <h1>PRANAY THAKUR</h1>
          <p>After a post-grad in marketing, and a couple months in a 9-5 gig, our founder pranay thakur, realised his affinity to the food industry. And like a true Foodpreneur, he went after this epiphany with all he had. And that crazy zeal, friends, has evolved from a cozy cafe in central Connaught Place into the thriving food chain that we all love today, brunvh.

            Starting and most importantly sustaining a restaurant in a cut-throat yet continuously evolving marketplace like Delhi comes with its own learnings, and currently with the smooth operational style of brunch, we can say pranay is well-equipped with the Logistical as well as Executive skill sets required to keep brunch always brimming with happy customers.</p>

              <h1>SARTHAK SHING</h1>
              <p>It all started the way back in 2015 while pursuing Chartered accountancy, and just one step away from completing his CA, Shivam decided to step into this business. With his passion and fascination with the F&B industry, in 2018, they started their first outlet in Connaught Place, New Delhi.

                He believes finance is the core of everything that can get really technical and challenging with GSTs, Income tax, mitigating risks like pandemic and policy changes. When it comes to the HR department, he feels that it is much more than taking care of the staff of all the outlets. He and his team try to build a positive and bias neutral culture to create an employee-centric work environment. Though they have honest and transparent law compliant practices, they recently introduced the legal affairs department to establish best legal practices and avoid unwanted challenges.</p>
